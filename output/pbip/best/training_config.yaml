bacteria_embedding_models:
- name: NT2
  params:
    model_name: nucleotide-transformer-v2-250m-multi-species
  strategy: TruncateStrategy
  use_cached_embeddings: true
- name: MegaDNA
  params:
    get_layer: concat
    weights_path: data/weights/megaDNA_phage_145M.pt
  strategy: TruncateStrategy
  use_cached_embeddings: true
- name: DNABERT2
  params:
    max_seq_len: 16384
    source_code_path: DNABERT-2-117M/
  strategy: BottomTruncateStrategy
  use_cached_embeddings: true
classifier:
  name: MLPClassifier
  params:
    bacterium_mlp_sizes:
    - 256
    - 128
    dense_dim: 256
    dropout: 0.4
    phage_mlp_sizes:
    - 256
    - 128
embeddings_dir: data/embeddings-pbip
gpu_id: 0
input_perphect:
  bacteria_df: data/perphect-data/predphi/bacteria_sequences.csv
  couples_df: data/perphect-data/predphi/predphi_train_dataset.csv
  phages_df: data/perphect-data/predphi/bacteriophages_sequences.csv
num_gpu: 0
output_dir: output/pbip/best
phages_embedding_models:
- name: NT2
  params:
    model_name: nucleotide-transformer-v2-250m-multi-species
  strategy: TopBottomTruncateStrategy
  use_cached_embeddings: true
- name: MegaDNA
  params:
    get_layer: concat
    weights_path: data/weights/megaDNA_phage_145M.pt
  strategy: TopBottomTruncateStrategy
  use_cached_embeddings: true
- name: DNABERT2
  params:
    max_seq_len: 16384
    source_code_path: DNABERT-2-117M/
  strategy: TKPertStrategy
  use_cached_embeddings: true
training_config:
  batch_size: 256
  do_test: true
  epochs: 100
  k_folds_cv: 10
  learning_rate: 1e-3
  stratify_cv: true
  training_noise_std: 0.05
