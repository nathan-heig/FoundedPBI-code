input_perphect:
  bacteria_df: data/perphect-data/all/bacteria_df.csv
  phages_df: data/perphect-data/all/phages_df.csv
  couples_df: data/perphect-data/all-private-oversampled/couples_df.csv
embeddings_dir: data/embeddings
num_gpu: 0
# gpu_id: 3
use_cached_embeddings: true
epochs: $EPOCHS
torch_num_threads: 1

phages_embedding_models:
  - name: NT2
    params: 
      model_name: nucleotide-transformer-v2-50m-multi-species
      overlap: 0
    strategy: $NT2PHAGESTRAT
  
  - name: MegaDNA
    params: 
      weights_path: data/weights/megaDNA_phage_145M.pt
      get_layer: avg
      overlap: 0
    strategy: $MEGADNAPHAGESTRAT

  - name: DNABERT2
    params: 
      source_code_path: foundation-models-test/DNABERT-2/DNABERT-2-117M/
      max_seq_len: 32768
      overlap: 0
    strategy: $DNABERTPHAGESTRAT

bacteria_embedding_models:
  - name: NT2
    params: 
      model_name: nucleotide-transformer-v2-50m-multi-species
      overlap: 0
    strategy: $NT2BACTSTRAT
  
  - name: MegaDNA
    params: 
      weights_path: data/weights/megaDNA_phage_145M.pt
      get_layer: avg
      overlap: 0
    strategy: $MEGADNABACTSTRAT
  
  - name: DNABERT2
    params: 
      source_code_path: foundation-models-test/DNABERT-2/DNABERT-2-117M/
      max_seq_len: 32768
      overlap: 0
    strategy: $DNABERTBACTSTRAT
