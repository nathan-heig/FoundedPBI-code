input_perphect:
  bacteria_df: data/perphect-data/all/bacteria_df.csv
  phages_df: data/perphect-data/all/phages_df.csv
  couples_df: data/perphect-data/all-private-oversampled/couples_df.csv
embeddings_dir: data/embeddings
num_gpu: 0
# gpu_id: 3
torch_num_threads: 1

training_config:
  # do_train: true
  epochs: 10
  learning_rate: 1e-3
  weight_decay: 0
  batch_size: 256

  k_folds_cv: 10

  patience_early_stopping: 100
  monitor_metric_early_stopping: f1

  patience_reduce_lr: 15
  monitor_metric_reduce_lr: f1
  multiplying_factor_reduce_lr: 0.5

phages_embedding_models:
  - name: NT2
    params: 
      model_name: nucleotide-transformer-v2-250m-multi-species
      overlap: 0
    strategy: $NT2PHAGESTRAT
    use_cached_embeddings: true

  
  - name: MegaDNA
    params: 
      weights_path: data/weights/megaDNA_phage_145M.pt
      get_layer: concat
      overlap: 0
    strategy: $MEGADNAPHAGESTRAT
    use_cached_embeddings: true


  - name: DNABERT2
    params: 
      source_code_path: foundation-models-test/DNABERT-2/DNABERT-2-117M/
      max_seq_len: 32768
      overlap: 0
    strategy: $DNABERTPHAGESTRAT
    use_cached_embeddings: true


bacteria_embedding_models:
  - name: NT2
    params: 
      model_name: nucleotide-transformer-v2-250m-multi-species
      overlap: 0
    strategy: $NT2BACTSTRAT
    use_cached_embeddings: true

  
  - name: MegaDNA
    params: 
      weights_path: data/weights/megaDNA_phage_145M.pt
      get_layer: concat
      overlap: 0
    strategy: $MEGADNABACTSTRAT
    use_cached_embeddings: true

  
  - name: DNABERT2
    params: 
      source_code_path: foundation-models-test/DNABERT-2/DNABERT-2-117M/
      max_seq_len: 32768
      overlap: 0
    strategy: $DNABERTBACTSTRAT
    use_cached_embeddings: true


classifier:
  name: BasicClassifier
  params:
    hidden_dim: 256