# input_perphect: data/perphect-data/dummy
input_perphect:
  bacteria_df: data/perphect-data/all/bacteria_df.csv
  phages_df: data/perphect-data/all/phages_df.csv
  couples_df: data/perphect-data/all-private-undersampled/couples_df.csv
embeddings_dir: data/embeddings
# embeddings_dir: data/embeddings-dummy
num_gpu: 1
gpu_id: 1
# use_cached_embeddings: true

phages_embedding_models:
  - name: NT2
    params: 
      model_name: $MODEL_NAME
      overlap: $OVERLAP
    strategy:
      name: TKPertStrategy
      params:
        merging_strategy: $TKPERT_MERGING_STRATEGY # concat or avg

bacteria_embedding_models:
  - name: NT2
    params: 
      model_name: $MODEL_NAME
      overlap: $OVERLAP
    strategy:
      name: TKPertStrategy
      params:
        merging_strategy: $TKPERT_MERGING_STRATEGY # concat or avg