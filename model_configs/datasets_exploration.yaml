input_perphect:
  bacteria_df: data/perphect-data/all/bacteria_df.csv
  phages_df: data/perphect-data/all/phages_df.csv
  # couples_df: data/perphect-data/all/couples_df.csv
  couples_df: data/perphect-data/all-private-oversampled/couples_df.csv
# embeddings_dir: data/embeddings-finetuned
embeddings_dir: data/embeddings
num_gpu: 1
gpu_id: 0

training_config:
  # do_train: true
  # epochs: 100
  # learning_rate: 1e-3
  # weight_decay: 0
  batch_size: 256

  k_folds_cv: 3

  # patience_early_stopping: 100
  # monitor_metric_early_stopping: f1

  # patience_reduce_lr: 100
  # monitor_metric_reduce_lr: f1
  # multiplying_factor_reduce_lr: 0.5


phages_embedding_models:
  - name: NT2
    params: 
      # model_name: nucleotide-transformer-v2-50m-multi-species
      model_name: "./finetuning/model_weights/nt2-phages-lora-perphect-lr-3/checkpoint-53550"
      overlap: 0
      batch_size: 16
      comma_separated_gpu_ids: "0"
    strategy: TruncateStrategy
    use_cached_embeddings: true


bacteria_embedding_models:
  - name: NT2
    params: 
      # model_name: nucleotide-transformer-v2-50m-multi-species
      model_name: "./finetuning/model_weights/nt2-bact-lora-perphect/checkpoint-151000"
      overlap: 0
      batch_size: 16
      comma_separated_gpu_ids: "0"
    strategy: TruncateStrategy
    use_cached_embeddings: true


classifier:
  name: SklearnClassifier
  params:
    sklearn_model_name: LGBMClassifier
    sklearn_model_params:
      n_estimators: 350
      num_leaves: 63
      n_jobs: -20