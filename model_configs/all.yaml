# input_perphect: data/perphect-data/dummy
input_perphect:
  bacteria_df: data/perphect-data/all/bacteria_df.csv
  phages_df: data/perphect-data/all/phages_df.csv
  couples_df: data/perphect-data/all-private-oversampled/couples_df.csv
embeddings_dir: data/embeddings
# embeddings_dir: data/embeddings-dummy
num_gpu: 1
gpu_id: 1
use_cached_embeddings: true
# torch_num_threads: 1

# Only useful when using torch classifiers
training_config:
  # do_train: true
  epochs: 100
  learning_rate: 1e-3
  weight_decay: 1e-4
  batch_size: 256

  k_folds_cv: 3

  patience_early_stopping: 10
  monitor_metric_early_stopping: f1

  patience_reduce_lr: 5
  monitor_metric_reduce_lr: f1
  multiplying_factor_reduce_lr: 0.5

phages_embedding_models:
  - name: NT2
    params: 
      model_name: nucleotide-transformer-v2-50m-multi-species
      overlap: 0
    # strategy: TruncateStrategy
    strategy: TKPertStrategy
    # strategy:
    #   name: TKPertStrategy
    #   params:
    #     merging_strategy: concat # concat or avg
  
  - name: MegaDNA
    params: 
      weights_path: data/weights/megaDNA_phage_145M.pt
      get_layer: avg
      overlap: 0
    # strategy: TruncateStrategy
    strategy: TfidfStrategy
    # strategy:
    #   name: TKPertStrategy
    #   params:
    #     merging_strategy: concat # concat or avg

  - name: DNABERT2
    params: 
      source_code_path: foundation-models-test/DNABERT-2/DNABERT-2-117M/
      max_seq_len: 32768
      overlap: 0
    # strategy: TruncateStrategy
    strategy: Tf4idfStrategy

bacteria_embedding_models:
  - name: NT2
    params: 
      model_name: nucleotide-transformer-v2-50m-multi-species
      overlap: 0
    strategy: TruncateStrategy
    # strategy: MaxStrategy
    # strategy:
    #   name: TKPertStrategy
    #   params:
    #     merging_strategy: concat # concat or avg
  
  - name: MegaDNA
    params: 
      weights_path: data/weights/megaDNA_phage_145M.pt
      get_layer: avg
      overlap: 0
    # strategy: TruncateStrategy
    strategy: MaxStrategy
  
  - name: DNABERT2
    params: 
      source_code_path: foundation-models-test/DNABERT-2/DNABERT-2-117M/
      max_seq_len: 32768
      overlap: 0
    # strategy: TruncateStrategy
    strategy: MaxStrategy

