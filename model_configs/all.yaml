classifier:
  name: SklearnClassifier
  params:
    sklearn_model_name: LGBMClassifier
    sklearn_model_params:
      n_estimators: 256
      num_leaves: 63
      boosting_type: gbdt # gbdt, dart, rf
      force_col_wise: true
      n_jobs: -10

